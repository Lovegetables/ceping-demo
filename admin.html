<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测评结果后台查看</title>
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-head">
        <div>
          <p class="eyebrow">Assessment Admin</p>
          <h1>测评结果后台查看</h1>
          <p>这里会展示已经提交登记的测评用户结果，便于后续筛选和跟进。</p>
        </div>
        <div class="admin-head-actions">
          <button id="refreshBtn" type="button">刷新数据</button>
          <button class="ghost-btn" id="logoutBtn" type="button">退出</button>
        </div>
      </header>

      <section class="login-card" id="loginCard">
        <div>
          <p class="eyebrow">Admin Login</p>
          <h2>请输入后台访问密码</h2>
          <p class="small-note">后台包含用户联系方式、学校背景和测评结果，仅限授权人员查看。</p>
        </div>
        <form id="loginForm" class="login-form">
          <input id="passwordInput" name="password" type="password" autocomplete="current-password" placeholder="后台访问密码" />
          <button type="submit">进入后台</button>
        </form>
        <p class="status-text" id="loginStatus"></p>
      </section>

      <section class="admin-content hidden" id="adminContent">
      <section class="admin-summary" id="summaryCards">
        <article class="summary-card">
          <span>总登记数</span>
          <strong id="totalCount">0</strong>
        </article>
        <article class="summary-card">
          <span>最近更新时间</span>
          <strong id="latestTime">-</strong>
        </article>
      </section>

      <section class="admin-actions">
        <article class="action-card">
          <div>
            <h2>飞书同步状态</h2>
            <p id="feishuStatusText" class="small-note">正在检查飞书配置...</p>
          </div>
          <button id="checkFeishuBtn" type="button">检查状态</button>
        </article>
        <article class="action-card">
          <div>
            <h2>历史记录补同步</h2>
            <p id="backfillStatusText" class="small-note">可将尚未进入飞书的历史记录补推一次。</p>
          </div>
          <button id="backfillBtn" type="button">补同步到飞书</button>
        </article>
        <article class="action-card">
          <div>
            <h2>批量导出PDF报告</h2>
            <p id="exportReportsStatusText" class="small-note">可将当前后台已加载的测评记录生成打印页，再保存为PDF。</p>
          </div>
          <button id="exportReportsBtn" type="button">批量导出</button>
        </article>
      </section>

      <section class="admin-table-wrap">
        <div class="status-text" id="statusText">正在加载后台登记结果...</div>
        <div id="recordList" class="record-list"></div>
      </section>
      </section>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
