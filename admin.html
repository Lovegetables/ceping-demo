<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测评结果后台查看</title>
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-head">
        <div>
          <p class="eyebrow">Assessment Admin</p>
          <h1>测评结果后台查看</h1>
          <p>这里会展示已经提交登记的测评用户结果，便于后续筛选和跟进。</p>
        </div>
        <button id="refreshBtn" type="button">刷新数据</button>
      </header>

      <section class="admin-summary" id="summaryCards">
        <article class="summary-card">
          <span>总登记数</span>
          <strong id="totalCount">0</strong>
        </article>
        <article class="summary-card">
          <span>最近更新时间</span>
          <strong id="latestTime">-</strong>
        </article>
      </section>

      <section class="admin-table-wrap">
        <div class="status-text" id="statusText">正在加载后台登记结果...</div>
        <div id="recordList" class="record-list"></div>
      </section>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
